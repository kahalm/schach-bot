services:
  schach-bot:
    build: .
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - GUILD_ID=${GUILD_ID:-0}
      - CHANNEL_ID=${CHANNEL_ID}
      - LICHESS_TOKEN=${LICHESS_TOKEN}
      - ROOKHUB_API_URL=${ROOKHUB_API_URL}
      - ROOKHUB_WEB_URL=${ROOKHUB_WEB_URL}
      - BOOKS_DIR=books
      - PUZZLE_HOUR=${PUZZLE_HOUR:-9}
      - PUZZLE_MINUTE=${PUZZLE_MINUTE:-0}
      - TOURNAMENT_CHANNEL_ID=${TOURNAMENT_CHANNEL_ID:-0}
      - WOCHENPOST_CHANNEL_ID=${WOCHENPOST_CHANNEL_ID:-0}
      - LIBRARY_INDEX=/app/library/index.txt
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - SFTPGO_BASE_URL=${SFTPGO_BASE_URL}
      - SFTPGO_SHARE_ID=${SFTPGO_SHARE_ID}
      - SFTPGO_SHARE_PASSWORD=${SFTPGO_SHARE_PASSWORD}
      # RookHub-Webhook (Solver-Updates). Secret == RookHubs SCHACH_BOT_WEBHOOK_SECRET; leer = deaktiviert.
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    ports:
      # Host-Port (= Port in der RookHub-URL) -> fester Container-Port 9000. Erreichbar via Host-IP.
      - "${WEBHOOK_PORT:-9000}:9000"
    volumes:
      - ./config:/app/config
      - ./books:/app/books
      - ./library:/app/library
    mem_limit: 512m
    cpus: 0.5
